name: Gradle Plugin CI

# Unit tests on every push/PR + a TestKit functional-test matrix across
# Gradle versions. Tag pushes also trigger Plugin Portal publishing, gated
# on credentials being configured.

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if [[ -f gradlew ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            if [[ -f settings.gradle.kts || -f build.gradle.kts ]]; then
              echo "::notice::Gradle build scripts found but no wrapper (gradlew). Run 'gradle wrapper' to enable CI."
            else
              echo "::notice::No Gradle wrapper found — skipping Gradle Plugin CI."
            fi
          fi

  unit:
    needs: detect
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: zulu
          cache: gradle
      - name: Compile + unit tests
        # `:plugin:test` runs unit tests (ProjectBuilder) only. Functional
        # tests live in the matrix job below. We deliberately avoid
        # `:plugin:check` here because the build script wires
        # `functionalTest` into `check`, which would duplicate functional
        # coverage on the default Gradle version and conflate stage
        # responsibilities.
        run: ./gradlew :plugin:test :plugin:compileFunctionalTestKotlin

  functional:
    needs: detect
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gradle-version: ["8.5", "8.10", "current"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: zulu
          cache: gradle
      - name: Functional tests against Gradle ${{ matrix.gradle-version }}
        run: |
          if [[ "${{ matrix.gradle-version }}" == "current" ]]; then
            ./gradlew :plugin:functionalTest
          else
            ./gradlew :plugin:functionalTest \
              -PgradleTestVersion=${{ matrix.gradle-version }}
          fi

  sample-consumer:
    needs: [unit, functional]
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: zulu
          cache: gradle
      - name: End-to-end consumer smoke test
        # The sample-consumer build is composite (includeBuild ..), so the
        # parent's wrapper drives it. If sample-consumer/gradlew is shipped,
        # prefer that for a closer match to consumer experience.
        run: |
          if [[ -x sample-consumer/gradlew ]]; then
            (cd sample-consumer && ./gradlew exampleHello --stacktrace)
          else
            (cd sample-consumer && ../gradlew exampleHello --stacktrace)
          fi

  publish:
    needs: [unit, functional, sample-consumer]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: zulu
          cache: gradle

      - name: Preflight — version catalog matches tag
        run: |
          catalog_version=$(awk -F'"' '/^[[:space:]]*pluginVersion[[:space:]]*=/ { print $2; exit }' gradle/libs.versions.toml)
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$catalog_version" != "$tag_version" ]]; then
            echo "::error::libs.versions.toml pluginVersion ($catalog_version) does not match tag ($tag_version)"
            exit 1
          fi
          echo "Publishing pluginVersion=$catalog_version"

      - name: Preflight — required Plugin Portal credentials
        id: portal_creds
        run: |
          if [[ -n "${{ secrets.GRADLE_PUBLISH_KEY }}" \
              && -n "${{ secrets.GRADLE_PUBLISH_SECRET }}" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GRADLE_PUBLISH_KEY/GRADLE_PUBLISH_SECRET not configured — skipping Plugin Portal publish."
          fi

      - name: Publish to Gradle Plugin Portal
        if: steps.portal_creds.outputs.ready == 'true'
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew :plugin:publishPlugins
