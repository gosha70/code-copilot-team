name: Gradle CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      java-version:
        description: "JDK version to test (leave blank to run full matrix)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  detect:
    # Lightweight gate: skip the build job entirely until the consumer
    # project ships the Gradle wrapper. hashFiles() is not allowed in
    # jobs.<id>.if, so detection happens in a step here and downstream
    # jobs gate on needs.detect.outputs.ready. Note: the workflow uses
    # ./gradlew, so the wrapper itself is the load-bearing marker —
    # build.gradle alone is insufficient (no `gradle` is installed on
    # the runner by default).
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if [[ -f gradlew ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            if [[ -f build.gradle || -f build.gradle.kts || -f settings.gradle || -f settings.gradle.kts ]]; then
              echo "::notice::Gradle build scripts found but no wrapper (gradlew). Run 'gradle wrapper' to enable CI."
            else
              echo "::notice::No Gradle wrapper found — skipping Gradle CI."
            fi
          fi

  build:
    needs: detect
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch with a non-empty java-version input runs that
        # version only; otherwise (push, PR, or blank dispatch) runs the full matrix.
        java-version: ${{ github.event.inputs.java-version && fromJSON(format('["{0}"]', github.event.inputs.java-version)) || fromJSON('["17","21"]') }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: zulu
          cache: gradle

      - name: Build
        run: ./gradlew build

      - name: Check (static analysis, style)
        run: ./gradlew check

      - name: Test
        run: ./gradlew test

  publish-staging:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: zulu
          cache: gradle

      - name: Publish to staging repository
        run: ./gradlew publishToMavenLocal
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
