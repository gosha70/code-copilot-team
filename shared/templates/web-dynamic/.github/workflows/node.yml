name: Node CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      node-version:
        description: "Node.js version to test (leave blank to run full matrix)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - "20"
          - "22"

    steps:
      - uses: actions/checkout@v5

      - name: Detect package manager
        id: pkgmgr
        run: |
          if [[ -f "pnpm-lock.yaml" ]]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "cache=pnpm" >> "$GITHUB_OUTPUT"
          elif [[ -f "yarn.lock" ]]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "cache=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "cache=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm (if detected)
        if: steps.pkgmgr.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ steps.pkgmgr.outputs.cache }}

      - name: Install dependencies
        run: ${{ steps.pkgmgr.outputs.install }}

      - name: Lint
        run: ${{ steps.pkgmgr.outputs.manager }} run lint

      - name: Type check
        run: ${{ steps.pkgmgr.outputs.manager }} run typecheck

      - name: Test
        run: ${{ steps.pkgmgr.outputs.manager }} run test
