name: Node CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      node-version:
        description: "Node.js version to test (leave blank to run full matrix)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  detect:
    # Lightweight gate: skip the test job entirely until the consumer
    # project ships package.json. hashFiles() is not allowed in
    # jobs.<id>.if, so detection happens in a step here and downstream
    # jobs gate on needs.detect.outputs.ready.
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v5
      - id: check
        run: |
          if [[ -f package.json ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No package.json found — skipping Node CI."
          fi

  test:
    needs: detect
    if: needs.detect.outputs.ready == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # workflow_dispatch with a non-empty node-version input runs that
        # version only; otherwise (push, PR, or blank dispatch) runs the full matrix.
        node-version: ${{ github.event.inputs.node-version && fromJSON(format('["{0}"]', github.event.inputs.node-version)) || fromJSON('["20","22"]') }}

    steps:
      - uses: actions/checkout@v5

      - name: Detect package manager
        id: pkgmgr
        run: |
          if [[ -f "pnpm-lock.yaml" ]]; then
            echo "manager=pnpm" >> "$GITHUB_OUTPUT"
            echo "install=pnpm install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "cache=pnpm" >> "$GITHUB_OUTPUT"
          elif [[ -f "yarn.lock" ]]; then
            echo "manager=yarn" >> "$GITHUB_OUTPUT"
            echo "install=yarn install --frozen-lockfile" >> "$GITHUB_OUTPUT"
            echo "cache=yarn" >> "$GITHUB_OUTPUT"
          else
            echo "manager=npm" >> "$GITHUB_OUTPUT"
            echo "install=npm ci" >> "$GITHUB_OUTPUT"
            echo "cache=npm" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm (if detected)
        if: steps.pkgmgr.outputs.manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: ${{ steps.pkgmgr.outputs.cache }}

      - name: Install dependencies
        run: ${{ steps.pkgmgr.outputs.install }}

      - name: Lint
        run: ${{ steps.pkgmgr.outputs.manager }} run lint

      - name: Type check
        run: ${{ steps.pkgmgr.outputs.manager }} run typecheck

      - name: Test
        run: ${{ steps.pkgmgr.outputs.manager }} run test
