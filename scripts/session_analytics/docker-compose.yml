# Local PostgreSQL for session-analytics development.
#
#   docker compose -f scripts/session_analytics/docker-compose.yml up -d
#
# Then point the harness at it:
#   export CCT_SA_DSN="postgresql://cct:cct@localhost:5433/session_analytics"
#   ./scripts/session-analytics ingest --copilot claude-code
#
# Port 5433 (not 5432) avoids colliding with a host Postgres. Data persists
# in the named volume; `down -v` wipes it.

services:
  postgres:
    image: postgres:16
    container_name: cct-session-analytics-pg
    environment:
      POSTGRES_USER: cct
      POSTGRES_PASSWORD: cct
      POSTGRES_DB: session_analytics
    ports:
      - "5433:5432"
    volumes:
      - cct_sa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cct -d session_analytics"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cct_sa_pgdata:
